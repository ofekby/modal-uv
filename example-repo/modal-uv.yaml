app_name: "example-repo"
work_dir: "/tmp/work"

volumes:
  - name: "modal-uv-cache"
    mount_path: "/mnt/volume"
    commit_interval_seconds: 30

env: {}

runtime:
  cpu: 1
  memory: 1024
  scaledown_window_seconds: 300

image:
  python_version: "3.12"
  base_image: "python:3.12-slim"

sync:
  ignore: []
