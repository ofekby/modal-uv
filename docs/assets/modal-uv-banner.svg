<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">modal-uv</title>
  <desc id="desc">A dark banner for modal-uv, showing Modal-inspired mint prisms, uv-inspired lime and purple blocks, and the tagline local dev loop, Modal compute.</desc>
