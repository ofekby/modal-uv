<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">modal-uv</title>
  <desc id="desc">A dark banner for modal-uv, showing a prism-style green and purple M over U logo and the tagline Local dev loop, Modal compute.</desc>
  <defs>
