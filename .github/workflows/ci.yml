name: CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ci.yml
      - pyproject.toml
      - uv.lock
      - src/**
      - tests/**
      - skills/**
      - playbooks/**
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - pyproject.toml
      - uv.lock
      - src/**
      - tests/**
      - skills/**
      - playbooks/**

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest -q
