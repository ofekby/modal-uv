name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - site/**
  pull_request:
    paths-ignore:
      - site/**

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest -q
